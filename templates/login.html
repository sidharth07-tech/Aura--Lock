{% extends "layout.html" %}

{% block content %}

<div class="auth-container">

    <div class="auth-card">

        <h2>Login</h2>

        <form method="POST">

            <input
                type="text"
                name="phone"
                placeholder="Phone Number"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Password"
                required
            >

            <button type="submit">
                Login
            </button>

        </form>

        <div class="auth-links">

            <a href="/signup">
                Create Account
            </a>

            <a href="/forgot-password">
                Forgot Password?
            </a>

        </div>

    </div>

</div>

{% endblock %}
