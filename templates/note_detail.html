{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="card shadow-sm">
      <div class="card-body">
        <h2 class="card-title">{{ note['title'] }}</h2>
        <p class="text-muted">Created at {{ note['created_at'] }}</p>
        <div class="note-content pt-3 border-top mt-3">
          {{ note['content'] | e | replace('\n', '<br>') | safe }}
        </div>
        <a class="btn btn-secondary mt-4" href="{{ url_for('dashboard') }}">Back to Dashboard</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
