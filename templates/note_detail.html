{% extends "layout.html" %}
{% block content %}
<div class="page-banner page-banner-small">
  <div>
    <h1 class=\"text-gradient-primary text-shadow-soft\">{{ note['title'] }}</h1>
    <p class="hero-subtitle">Review your saved note and continue editing from the dashboard.</p>
  </div>
</div>
<div class="page-body">
  <div class="note-detail-card card-surface">
    <div class="note-detail-header">
      <span class="note-date">Created at {{ note['created_at'] }}</span>
    </div>
    <div class="note-content">{{ note['content'] | e | replace('\n', '<br>') | safe }}</div>
    <div class="mt-4">
      <a class="btn btn-secondary" href="{{ url_for('dashboard') }}">Back to Dashboard</a>
    </div>
  </div>
</div>
{% endblock %}
