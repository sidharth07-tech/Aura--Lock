{% extends "layout.html" %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-panel auth-panel-left-alt">
      <span class="auth-badge">Password Recovery</span>
      <h1 class=\"text-gradient-accent\">Forgot Password?</h1>
      <p class="auth-tagline">Enter the phone number linked to your account to receive a secure OTP and reset your password.</p>
    </div>
    <div class="auth-panel auth-panel-right">
      <div class="auth-card-header">
        <h2>Reset Access</h2>
        <p class="text-muted">We will send a one-time code to your phone.</p>
      </div>
      <form method="post" class="auth-form">
        <div class="form-group">
          <label class="form-label">Phone Number</label>
          <input type="text" name="phone" class="form-control" placeholder="+91 98765 43210" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Send OTP</button>
      </form>
      <div class="auth-actions">
        <a href="{{ url_for('login') }}" class="small-link">Back to login</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
