{% extends "layout.html" %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-panel auth-panel-left-alt">
      <span class="auth-badge">Verify Reset</span>
      <h1 class=\"text-gradient-accent\">Secure OTP</h1>
      <p class="auth-tagline">Confirm your identity and set a new password for your account.</p>
    </div>
    <div class="auth-panel auth-panel-right">
      <div class="auth-card-header">
        <h2>Enter OTP</h2>
        <p class="text-muted">OTP sent to <strong>{{ phone }}</strong>. Use the code below for demo purposes.</p>
      </div>
      <div class=\"alert alert-secondary\"><strong class=\"font-mono\">OTP: {{ otp_code }}</strong></div>
      <form method="post" action="{{ url_for('forgot_password_confirm') }}" class="auth-form">
        <input type="hidden" name="phone" value="{{ phone }}">
        <div class="form-group">
          <label class="form-label">OTP Code</label>
          <input type="text" name="otp" class="form-control" required>
        </div>
        <div class="form-group">
          <label class="form-label">New Password</label>
          <input type="password" name="new_password" class="form-control" required>
        </div>
        <div class="form-group">
          <label class="form-label">Confirm New Password</label>
          <input type="password" name="confirm_password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-success w-100">Reset Password</button>
      </form>
      <div class="auth-actions">
        <a href="{{ url_for('login') }}" class="small-link">Back to login</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
