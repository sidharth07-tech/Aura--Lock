{% extends "layout.html" %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-panel auth-panel-left">
      <span class="auth-badge">Phone Verification</span>
      <h1 class=\"text-gradient-primary\">Verify Your Phone</h1>
      <p class="auth-tagline">Enter the OTP received on your phone to complete account setup.</p>
    </div>
    <div class="auth-panel auth-panel-right">
      <div class="auth-card-header">
        <h2>Confirm Identity</h2>
        <p class="text-muted">OTP sent to <strong>{{ phone }}</strong>. Use the code below for demo purposes.</p>
      </div>
      <div class=\"alert alert-secondary\"><strong class=\"font-mono\">OTP: {{ otp_code }}</strong></div>
      <form method="post" action="{{ url_for('verify') }}" class="auth-form">
        <input type="hidden" name="phone" value="{{ phone }}">
        <div class="form-group">
          <label class="form-label">Enter OTP</label>
          <input type="text" name="otp" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Verify</button>
      </form>
      <div class="auth-actions">
        <a href="{{ url_for('login') }}" class="small-link">Back to login</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
