{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="card shadow-sm">
      <div class="card-body">
        <h2 class="card-title mb-3">Write a New Note</h2>
        <p class="text-muted mb-4">Add a title, capture your thoughts, and save it securely with a timestamp.</p>
        <form method="post" action="{{ url_for('save_note') }}">
          <div class="mb-3">
            <label class="form-label">Title</label>
            <input type="text" name="title" class="form-control" placeholder="Note title" value="{{ note.title if note else '' }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Content</label>
            <textarea name="content" class="form-control note-textarea" placeholder="Write your note here..." required>{{ note.content if note else '' }}</textarea>
          </div>
          <button type="submit" class="btn btn-success">Save Note</button>
          <a class="btn btn-secondary ms-2" href="{{ url_for('dashboard') }}">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
