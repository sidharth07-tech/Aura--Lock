{% extends "layout.html" %}
{% block content %}
<div class="page-banner page-banner-small">
  <div>
    <h1 class=\"text-gradient-primary text-shadow-soft\">{{ note.title if note else 'New Note' }}</h1>
    <p class="hero-subtitle">Add a title, capture your thoughts, and save notes securely with a polished interface.</p>
  </div>
</div>
<div class="page-body">
  <div class="card card-surface">
    <div class="card-body">
      <form method="post" action="{{ url_for('save_note') }}">
        <div class="form-group mb-4">
          <label class="form-label">Title</label>
          <input type="text" name="title" class="form-control" placeholder="Note title" value="{{ note.title if note else '' }}" required>
        </div>
        <div class="form-group mb-4">
          <label class="form-label">Content</label>
          <textarea name="content" class="form-control note-textarea" placeholder="Write your note here..." required>{{ note.content if note else '' }}</textarea>
        </div>
        <div class="d-flex gap-3 flex-wrap">
          <button type="submit" class="btn btn-success">Save Note</button>
          <a class="btn btn-secondary" href="{{ url_for('dashboard') }}">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
