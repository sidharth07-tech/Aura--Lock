{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-body">
        <h2 class="card-title mb-3">Forgot Password</h2>
        <p class="text-muted mb-4">Enter the phone number linked to your account and we will send an OTP for reset.</p>
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Phone Number</label>
            <input type="text" name="phone" class="form-control" placeholder="Enter phone number" required>
          </div>
          <button type="submit" class="btn btn-primary">Send OTP</button>
        </form>
        <p class="mt-3">Remembered your password? <a href="{{ url_for('login') }}">Login</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
