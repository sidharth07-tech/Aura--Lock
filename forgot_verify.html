{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-body">
        <h2 class="card-title mb-3">Reset Your Password</h2>
        <p class="text-muted mb-4">Enter the OTP received on <strong>{{ phone }}</strong> and choose a new password.</p>
        <div class="alert alert-secondary"><strong>OTP: {{ otp_code }}</strong></div>
        <form method="post" action="{{ url_for('forgot_password_confirm') }}">
          <input type="hidden" name="phone" value="{{ phone }}">
          <div class="mb-3">
            <label class="form-label">OTP Code</label>
            <input type="text" name="otp" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">New Password</label>
            <input type="password" name="new_password" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Confirm New Password</label>
            <input type="password" name="confirm_password" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-warning">Reset Password</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
